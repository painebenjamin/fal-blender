name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install pytest
      
      - name: Run unit tests
        run: |
          # Run from temp dir to avoid bpy import issues
          cp tests/test_models.py /tmp/test_models.py
          python -m pytest /tmp/test_models.py -v

