# Build and optionally release the fal.ai Blender extension.
#
# Triggers:
#   - Push a version tag (v*) → build + tag-based GitHub Release
#   - Manual dispatch → build only (artifacts attached to the run)
#
# Future: add marketplace uploads (Gumroad/Superhive) to the release job.

name: Build & Release Extension

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  EXTENSION_ID: fal_ai
  BLENDER_VERSION: "4.4.0"   # minimum that supports `--command extension build`

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Blender
        run: |
          set -euo pipefail
          # Grab the latest Blender 4.4 LTS tarball (needed for `extension build`)
          BLENDER_TARBALL="blender-${BLENDER_VERSION}-linux-x64.tar.xz"
          BLENDER_URL="https://download.blender.org/release/Blender${BLENDER_VERSION%.*}/${BLENDER_TARBALL}"
          echo "Downloading $BLENDER_URL"
          curl -fSL "$BLENDER_URL" -o /tmp/blender.tar.xz
          mkdir -p /opt/blender
          tar -xf /tmp/blender.tar.xz -C /opt/blender --strip-components=1
          echo "/opt/blender" >> "$GITHUB_PATH"

      - name: Download wheels (all platforms × Python 3.11 + 3.13)
        run: |
          WHEEL_FRESH=1 make wheels

      - name: Generate manifest
        run: make sync-manifest

      - name: Build per-platform packages
        run: |
          mkdir -p dist
          blender --background --command extension build --split-platforms \
            --source-dir . --output-dir dist

      - name: List build artifacts
        run: ls -lh dist/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: blender-extension-packages
          path: dist/*.zip
          retention-days: 90

  # ── Release (only on tag push) ─────────────────────────────────────────
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write          # create GitHub releases
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: blender-extension-packages
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          generate_release_notes: true
